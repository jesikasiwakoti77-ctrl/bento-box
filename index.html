<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Favorite Human</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>For my sister.</h1>
            <p>The best parts of us, all in one place.</p>
        </header>

        <div class="bento-grid">
            <!-- 1. HERO IMAGE -->
            <div class="card card-large">
                <img src="hero.webp" alt="Main Photo">
                <div class="card-overlay">Forever Grateful.</div>
            </div>

            <!-- 2. SHORT VIDEO -->
            <div class="card card-tall">
                <video autoplay muted loop playsinline>
                    <source src="memory.mp4" type="video/mp4">
                </video>
            </div>

            <!-- 3. QUOTE BOX -->
            <div class="card card-text pink-bg">
                <p class="quote">"Because I have a sister, I'll always have a friend."</p>
            </div>

            <!-- 4. CHILDHOOD PHOTO -->
            <div class="card card-medium">
                <img src="childhood.webp" alt="Childhood Memory">
                <div class="label">Little Us</div>
            </div>

            <!-- 5. MUSIC BOX -->
            <div class="card card-wide spotify-box">
                <div class="music-info">
                    <span>Current Vibe</span>
                    <h3>The Soundtrack of Our Lives 🎵</h3>
                </div>
            </div>

            <!-- 6. INTERACTIVE MESSAGE (Tap/Click to see) -->
            <div class="card card-small message-box">
                <div class="reveal-content">
                    <span class="front">Click for a message...</span>
                    <span class="back">You're the strongest person I know! 💖</span>
                </div>
            </div>
            
            <!-- 7. AESTHETIC FILLER -->
            <div class="card card-small">
                <img src="aesthetic.webp" alt="Aesthetic Vibe">
            </div>
        </div>

        <footer>
            <p>Made with love • 2024</p>
        </footer>
    </div>

</body>
</html>
