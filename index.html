<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sister</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for that aesthetic look -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bento-container">
        <!-- 1. Hero Image / Big Memory -->
        <div class="item item-large main-photo">
            <img src="your-photo-1.jpg" alt="Sisterhood">
            <div class="overlay">Best Friends Since Day 1</div>
        </div>

        <!-- 2. A Sweet Quote -->
        <div class="item item-small quote-box">
            <p>"A sister is a little bit of childhood that can never be lost."</p>
        </div>

        <!-- 3. Mini Video (Auto-playing loop) -->
        <div class="item item-tall video-box">
            <video autoplay muted loop playsinline>
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>

        <!-- 4. Childhood Throwback -->
        <div class="item item-medium childhood-photo">
            <img src="childhood.jpg" alt="Baby photos">
        </div>

        <!-- 5. Current Mood / Music Widget -->
        <div class="item item-wide music-box">
            <span class="music-label">Currently Playing:</span>
            <h3>Our Favorite Song 🎵</h3>
            <!-- You can embed a Spotify iframe here -->
        </div>

        <!-- 6. Small Note/Secret Message -->
        <div class="item item-small note">
            <span>Tap for a secret...</span>
            <div class="hidden-text">I'm so proud of you!</div>
        </div>
    </div>

</body>
</html>
