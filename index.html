<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Best Friend & Sister</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: A mix of elegant serif and clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>To my favorite human.</h1>
            <p>A little space for our big memories.</p>
        </header>

        <div class="bento-grid">
            <!-- 1. HERO IMAGE (Main memory) -->
            <div class="card card-large">
                <img src="assets/hero.webp" alt="Us">
                <div class="card-overlay">The best days.</div>
            </div>

            <!-- 2. SHORT LOOPING VIDEO -->
            <div class="card card-tall">
                <video autoplay muted loop playsinline>
                    <source src="assets/memory.mp4" type="video/mp4">
                </video>
            </div>

            <!-- 3. A SWEET QUOTE -->
            <div class="card card-text pink-bg">
                <p class="quote">"Side by side or miles apart, we are sisters connected by the heart."</p>
            </div>

            <!-- 4. CHILDHOOD PHOTO -->
            <div class="card card-medium">
                <img src="assets/childhood.webp" alt="Then">
                <div class="label">Circa 2005</div>
            </div>

            <!-- 5. SPOTIFY / MUSIC BOX -->
            <!-- REPLACE THE LINK BELOW WITH YOUR OWN SPOTIFY EMBED CODE IF YOU WANT -->
            <div class="card card-wide spotify-box">
                <div class="music-info">
                    <span>Our Anthem</span>
                    <h3>The Soundtrack of Us 🎵</h3>
                </div>
            </div>

            <!-- 6. INTERACTIVE MESSAGE -->
            <div class="card card-small message-box">
                <div class="reveal-content">
                    <span class="front">Tap for a secret...</span>
                    <span class="back">I'll always be your #1 fan! 💖</span>
                </div>
            </div>
            
            <!-- 7. A SMALL AESTHETIC IMAGE -->
            <div class="card card-small">
                <img src="assets/aesthetic.webp" alt="Vibe">
            </div>
        </div>

        <footer>
            <p>Made with love by [Your Name] • 2024</p>
        </footer>
    </div>

</body>
</html>
